version: 1
applications:
  - appRoot: web-frontend
    env:
      variables:
        NEXT_TELEMETRY_DISABLED: "1"
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 20
            - nvm use 20
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - .npm/**/*
          - .next/cache/**/*
