server {
  listen 80;
  listen [::]:80;
  server_name arvann.in www.arvann.in;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/arvann/current;
    default_type text/plain;
    try_files $uri =404;
  }

  location / {
    return 301 https://arvann.in$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name arvann.in www.arvann.in;

  root /var/www/arvann/current;
  index index.html;

  ssl_certificate /etc/letsencrypt/live/arvann.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/arvann.in/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  etag on;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header X-Frame-Options SAMEORIGIN always;

  if ($host = www.arvann.in) {
    return 301 https://arvann.in$request_uri;
  }

  location ^~ /_next/static/ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ~* \.(?:css|js|mjs|svg|ico|png|jpg|jpeg|gif|webp|avif|woff|woff2)$ {
    try_files $uri =404;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  location ~ ^/dashboard/products/(?!(?:detail|category|mine|search)(?:/|$))([^/]+)/?$ {
    return 302 /dashboard/products/detail/?productId=$1;
  }

  location ~ ^/sellers/(?!(?:detail)(?:/|$))([^/]+)/?$ {
    return 302 /sellers/detail/?companyId=$1;
  }

  location ~ ^/admin/users/(?!(?:detail)(?:/|$))([^/]+)/?$ {
    return 302 /admin/users/detail/?userId=$1;
  }

  location / {
    try_files $uri $uri/ /404.html;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location = /404.html {
    internal;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
