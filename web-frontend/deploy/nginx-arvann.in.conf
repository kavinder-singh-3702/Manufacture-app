server {
    listen 80;
    listen [::]:80;
    server_name arvann.in www.arvann.in;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://arvann.in$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name arvann.in www.arvann.in;

    ssl_certificate /etc/letsencrypt/live/arvann.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arvann.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:arvann_ssl:10m;
    ssl_session_timeout 1d;

    if ($host = www.arvann.in) {
        return 301 https://arvann.in$request_uri;
    }

    # Legacy query-param detail redirects for dashboard/admin client routes.
    # Public /products/<id> and /sellers/<id> are now real SSR pages
    # (next.config.ts canonicalizes the legacy ?productId / ?companyId forms),
    # so they must NOT be redirected here or they would loop.
    location = /dashboard/products {
        return 301 /dashboard/products/;
    }
    location ~ ^/dashboard/products/(?!(?:detail|category|mine|search)(?:/|$))([^/]+)/?$ {
        return 302 /dashboard/products/detail/?productId=$1;
    }
    location ~ ^/admin/users/(?!(?:detail)(?:/|$))([^/]+)/?$ {
        return 302 /admin/users/detail/?userId=$1;
    }

    # Immutable Next build assets.
    location ^~ /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        access_log off;
    }

    # Everything else -> Next.js server (SSR + ISR). Next owns security headers.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
